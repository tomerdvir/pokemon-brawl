<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="336" height="377" viewBox="0 0 336 377">
  <!-- Skylor - Orange Ninja with Quiver -->

  <!-- Drop shadow -->
  <ellipse cx="168" cy="365" rx="65" ry="12" fill="#000" opacity="0.18"/>

  <!-- Legs -->
  <rect x="120" y="270" width="38" height="72" rx="8" fill="#f5a623"/>
  <rect x="178" y="270" width="38" height="72" rx="8" fill="#f5a623"/>
  <!-- Feet -->
  <rect x="116" y="330" width="46" height="22" rx="8" fill="#d48b0a"/>
  <rect x="174" y="330" width="46" height="22" rx="8" fill="#d48b0a"/>
  <!-- Knee armor -->
  <path d="M126 290 h26 l-3 16 h-20 z" fill="#8B4513" opacity="0.8"/>
  <path d="M184 290 h26 l-3 16 h-20 z" fill="#8B4513" opacity="0.8"/>
  <rect x="130" y="292" width="18" height="10" rx="3" fill="#d48b0a" stroke="#8B4513" stroke-width="1"/>
  <rect x="188" y="292" width="18" height="10" rx="3" fill="#d48b0a" stroke="#8B4513" stroke-width="1"/>

  <!-- Body / Torso -->
  <rect x="108" y="170" width="120" height="110" rx="16" fill="#f5a623"/>
  <!-- Chest armor overlay -->
  <path d="M128 180 L168 175 L208 180 L208 240 L168 248 L128 240 Z" fill="#8B4513" opacity="0.5"/>
  <!-- Gi cross-wrap -->
  <path d="M130 185 L168 230 L206 185" fill="none" stroke="#ffe0a0" stroke-width="3" opacity="0.7"/>
  <path d="M130 230 L168 200 L206 230" fill="none" stroke="#ffe0a0" stroke-width="3" opacity="0.7"/>
  <!-- Belt / sash -->
  <rect x="112" y="248" width="112" height="18" rx="6" fill="#8B4513"/>
  <!-- Belt center emblem -->
  <circle cx="168" cy="257" r="9" fill="#d48b0a" stroke="#5c3310" stroke-width="1.5"/>
  <path d="M163 257 L168 252 L173 257 L168 262 Z" fill="#ffe0a0" opacity="0.7"/>
  <!-- Chest emblem (amber/power symbol) -->
  <circle cx="168" cy="208" r="14" fill="#d48b0a" stroke="#5c3310" stroke-width="2"/>
  <circle cx="168" cy="208" r="8" fill="#f5a623"/>
  <path d="M162 208 h12 M168 202 v12" stroke="#5c3310" stroke-width="2" stroke-linecap="round"/>

  <!-- Arms -->
  <rect x="78" y="180" width="36" height="70" rx="12" fill="#f5a623"/>
  <rect x="222" y="180" width="36" height="70" rx="12" fill="#f5a623"/>
  <!-- Arm wraps -->
  <rect x="82" y="225" width="28" height="5" rx="2" fill="#ffe0a0" opacity="0.6"/>
  <rect x="226" y="225" width="28" height="5" rx="2" fill="#ffe0a0" opacity="0.6"/>
  <!-- Hands -->
  <circle cx="96" cy="255" r="12" fill="#222"/>
  <circle cx="240" cy="255" r="12" fill="#222"/>

  <!-- Quiver (on back, visible on right shoulder) -->
  <g transform="translate(225, 140) rotate(15)">
    <!-- Quiver body -->
    <rect x="-12" y="0" width="24" height="55" rx="6" fill="#5c3310"/>
    <rect x="-10" y="2" width="20" height="50" rx="5" fill="#6b3a14"/>
    <!-- Quiver rim -->
    <rect x="-14" y="-3" width="28" height="8" rx="4" fill="#4a2810"/>
    <!-- Arrows sticking out -->
    <line x1="-6" y1="-3" x2="-8" y2="-30" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-3" x2="2" y2="-35" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <line x1="6" y1="-3" x2="9" y2="-28" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrow feathers -->
    <path d="M-10 -28 l-5 -6 l7 2" fill="#5c3310"/>
    <path d="M0 -33 l-4 -7 l6 3" fill="#5c3310"/>
    <path d="M7 -26 l-3 -7 l6 2" fill="#5c3310"/>
    <!-- Arrow tips -->
    <polygon points="-8,-30 -11,-36 -5,-36" fill="#888"/>
    <polygon points="2,-35 -1,-41 5,-41" fill="#888"/>
    <polygon points="9,-28 6,-34 12,-34" fill="#888"/>
  </g>

  <!-- Strap across chest (for quiver) -->
  <line x1="210" y1="160" x2="130" y2="250" stroke="#4a2810" stroke-width="5" stroke-linecap="round"/>
  <line x1="210" y1="160" x2="130" y2="250" stroke="#5c3310" stroke-width="3" stroke-linecap="round"/>

  <!-- Head -->
  <rect x="128" y="68" width="80" height="90" rx="20" fill="#f5a623"/>
  <!-- Ninja mask / head wrap -->
  <rect x="124" y="72" width="88" height="86" rx="22" fill="#f5a623"/>
  <!-- Mask wrap band -->
  <rect x="124" y="95" width="88" height="32" rx="4" fill="#d48b0a"/>

  <!-- Face slit - yellow skin showing -->
  <rect x="136" y="102" width="64" height="20" rx="4" fill="#ffcc00"/>

  <!-- Eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="153" cy="112" rx="7" ry="6" fill="#fff"/>
    <ellipse cx="155" cy="112" rx="4" ry="5" fill="#1a1a1a"/>
    <circle cx="156" cy="110" r="1.5" fill="#fff"/>
    <!-- Right eye -->
    <ellipse cx="183" cy="112" rx="7" ry="6" fill="#fff"/>
    <ellipse cx="185" cy="112" rx="4" ry="5" fill="#1a1a1a"/>
    <circle cx="186" cy="110" r="1.5" fill="#fff"/>
    <!-- Determined eyebrows -->
    <line x1="145" y1="104" x2="160" y2="106" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="191" y1="104" x2="176" y2="106" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Head top emblem -->
  <path d="M148 78 Q168 60 188 78" fill="none" stroke="#d48b0a" stroke-width="4" stroke-linecap="round"/>
  <!-- Top emblem symbol -->
  <g transform="translate(168, 70)">
    <path d="M-6 2 L0 -8 L6 2 Z" fill="#ffe0a0" opacity="0.9"/>
    <path d="M-4 0 L0 -5 L4 0 Z" fill="#d48b0a"/>
  </g>
</svg>
