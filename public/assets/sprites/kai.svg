<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="336" height="377" viewBox="0 0 336 377">
  <!-- Kai - Red Ninja with Golden Sword -->

  <!-- Drop shadow -->
  <ellipse cx="168" cy="365" rx="65" ry="12" fill="#000" opacity="0.18"/>

  <!-- Legs -->
  <rect x="120" y="270" width="38" height="72" rx="8" fill="#cc2222"/>
  <rect x="178" y="270" width="38" height="72" rx="8" fill="#cc2222"/>
  <!-- Feet -->
  <rect x="116" y="330" width="46" height="22" rx="8" fill="#991111"/>
  <rect x="174" y="330" width="46" height="22" rx="8" fill="#991111"/>
  <!-- Knee details -->
  <rect x="130" y="295" width="18" height="6" rx="3" fill="#991111"/>
  <rect x="188" y="295" width="18" height="6" rx="3" fill="#991111"/>

  <!-- Body / Torso -->
  <rect x="108" y="170" width="120" height="110" rx="16" fill="#cc2222"/>
  <!-- Gi wrap lines -->
  <path d="M168 175 L138 230 L168 240 L198 230 Z" fill="#aa1a1a" opacity="0.6"/>
  <!-- Belt / sash -->
  <rect x="112" y="248" width="112" height="18" rx="6" fill="#3c2415"/>
  <!-- Belt knot -->
  <rect x="157" y="246" width="22" height="22" rx="4" fill="#4a2e1a"/>
  <!-- Chest emblem (fire) -->
  <circle cx="168" cy="210" r="14" fill="#ff6600" opacity="0.8"/>
  <path d="M168 198 Q172 206 168 214 Q164 206 168 198" fill="#ffdd44" opacity="0.9"/>

  <!-- Arms -->
  <rect x="78" y="180" width="36" height="70" rx="12" fill="#cc2222"/>
  <rect x="222" y="180" width="36" height="70" rx="12" fill="#cc2222"/>
  <!-- Hands -->
  <circle cx="96" cy="255" r="12" fill="#222"/>
  <circle cx="240" cy="255" r="12" fill="#222"/>

  <!-- Golden Sword (held in right hand) -->
  <g transform="translate(240, 200) rotate(-35)">
    <!-- Blade -->
    <rect x="-5" y="-95" width="10" height="75" rx="2" fill="#ffd700"/>
    <polygon points="0,-100 -7,-90 7,-90" fill="#ffd700"/>
    <!-- Blade shine -->
    <rect x="-2" y="-90" width="4" height="65" rx="1" fill="#fff8b0" opacity="0.6"/>
    <!-- Guard -->
    <rect x="-14" y="-22" width="28" height="8" rx="3" fill="#222"/>
    <rect x="-12" y="-20" width="24" height="4" rx="2" fill="#ffd700"/>
    <!-- Handle -->
    <rect x="-5" y="-14" width="10" height="28" rx="3" fill="#222"/>
    <!-- Handle wrap -->
    <rect x="-4" y="-10" width="8" height="3" rx="1" fill="#ffd700" opacity="0.7"/>
    <rect x="-4" y="-3" width="8" height="3" rx="1" fill="#ffd700" opacity="0.7"/>
    <rect x="-4" y="4" width="8" height="3" rx="1" fill="#ffd700" opacity="0.7"/>
  </g>

  <!-- Head -->
  <rect x="128" y="68" width="80" height="90" rx="20" fill="#cc2222"/>
  <!-- Ninja mask / head wrap -->
  <rect x="124" y="72" width="88" height="86" rx="22" fill="#cc2222"/>
  <!-- Mask wrap band -->
  <rect x="124" y="95" width="88" height="32" rx="4" fill="#aa1a1a"/>

  <!-- Face slit - yellow skin showing -->
  <rect x="136" y="102" width="64" height="20" rx="4" fill="#ffcc00"/>

  <!-- Eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="153" cy="112" rx="7" ry="6" fill="#fff"/>
    <ellipse cx="155" cy="112" rx="4" ry="5" fill="#1a1a1a"/>
    <circle cx="156" cy="110" r="1.5" fill="#fff"/>
    <!-- Right eye -->
    <ellipse cx="183" cy="112" rx="7" ry="6" fill="#fff"/>
    <ellipse cx="185" cy="112" rx="4" ry="5" fill="#1a1a1a"/>
    <circle cx="186" cy="110" r="1.5" fill="#fff"/>
    <!-- Angry eyebrows -->
    <line x1="145" y1="103" x2="160" y2="106" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="191" y1="103" x2="176" y2="106" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Head top knot / wrap detail -->
  <path d="M148 78 Q168 60 188 78" fill="none" stroke="#aa1a1a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="168" cy="68" r="6" fill="#aa1a1a"/>
</svg>
